spring:
  datasource:
    url: jdbc:h2:mem:api_demo;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.apidemo.script.entity
  configuration:
    map-underscore-to-camel-case: true
